# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
# =============================================================================
# golangci-lint v2 — ANC Portal Backend
# =============================================================================
# ใช้: golangci-lint run
# CI: golangci-lint-action@v7 จะอ่านไฟล์นี้อัตโนมัติ
# =============================================================================

version: "2"

run:
  timeout: 5m

output:
  formats:
    text:
      print-linter-name: true
  sort-order:
    - file

linters:
  default: none
  enable:
    # >> Bugs & Correctness
    - errcheck          # ตรวจ unchecked errors
    - govet             # vet ตรวจ suspicious constructs
    - staticcheck       # static analysis ระดับสูง (รวม gosimple แล้ว)
    - bodyclose         # ตรวจ HTTP response body ไม่ปิด
    - noctx             # ตรวจ HTTP request ไม่ส่ง context
    - rowserrcheck      # ตรวจ sql.Rows.Err()
    - sqlclosecheck     # ตรวจ sql.Rows/Stmt ไม่ปิด

    # >> Performance
    - prealloc          # แนะนำ pre-allocate slices
    - ineffassign       # ตรวจ assignment ที่ไม่ได้ใช้

    # >> Style & Simplicity
    - unused            # ตรวจ code ที่ไม่ได้ใช้
    - gocritic          # opinionated linter — diagnostic + performance

    # >> Security
    - gosec             # ตรวจ security issues

  settings:
    govet:
      enable:
        - shadow
    gosec:
      excludes:
        - G101          # hardcoded credentials (error code constants + test DSN)
        - G104          # unhandled errors (defer .Close())
        - G118          # goroutine with context.Background (ใช้ใน graceful shutdown + webhook)
        - G301          # directory permissions 0755 (testkit fixture)
        - G304          # file path from variable (config loader)
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      # Test files: ยกเว้น errcheck + gosec + noctx
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - noctx
      # Banner rows: prealloc ไม่จำเป็น (ขนาดเล็ก)
      - path: cmd/
        linters:
          - prealloc
      # Banner: output-only ไม่ต้อง check error
      - path: pkg/banner/
        linters:
          - errcheck
      # Generated swagger docs
      - path: docs/
        linters:
          - unused
    paths:
      - docs
      - testdata
      - tmp
      - migrations

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
