# =============================================================================
# Release — Auto-create GitHub Release with changelog
# =============================================================================
# Trigger: เมื่อ push tag v* (เช่น v1.0.0, v1.2.3-rc.1)
# Flow:    validate tag → generate changelog → create release → notify
#
# หมายเหตุ: Workflow นี้ทำงานร่วมกับ deploy-production.yml
#   - deploy-production.yml → deploy ขึ้น K8s
#   - release.yml           → สร้าง Release Notes บน GitHub
# =============================================================================
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # ← ต้อง fetch ทั้งหมดเพื่อเปรียบเทียบ tags

      # ─── Extract version info ───
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # ตรวจว่าเป็น prerelease (e.g. v1.0.0-rc.1, v1.0.0-beta.2)
          if [[ "$TAG" =~ -[a-zA-Z] ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} → pre-release"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} → stable release"
          fi

      # ─── Find previous tag for diff ───
      - name: Find previous tag
        id: prev
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "prev_tag=" >> "$GITHUB_OUTPUT"
            echo "No previous tag found (first release)"
          else
            echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
            echo "Previous tag: ${PREV_TAG}"
          fi

      # ─── Build metadata ───
      - name: Build metadata
        id: meta
        run: |
          COMMIT_COUNT=""
          if [ -n "${{ steps.prev.outputs.prev_tag }}" ]; then
            COMMIT_COUNT=$(git rev-list --count ${{ steps.prev.outputs.prev_tag }}..HEAD)
            echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
            echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Commits since last release: ${COMMIT_COUNT}"

      # ─── Generate changelog body ───
      - name: Generate release body
        id: body
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV="${{ steps.prev.outputs.prev_tag }}"
          COMMITS="${{ steps.meta.outputs.commit_count }}"
          SHA="${{ steps.meta.outputs.short_sha }}"

          BODY="## What's Changed\n\n"

          # Contributors section
          if [ -n "$PREV" ]; then
            AUTHORS=$(git log ${PREV}..HEAD --format='%aN' | sort -u | sed 's/^/- @/' | head -20)
            BODY+="### 📊 Stats\n"
            BODY+="- **Commits:** ${COMMITS}\n"
            BODY+="- **Compare:** [\`${PREV}...${TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV}...${TAG})\n\n"
          fi

          BODY+="### 🏗️ Build Info\n"
          BODY+="- **Commit:** \`${SHA}\`\n"
          BODY+="- **Image:** \`ghcr.io/${{ github.repository }}:${TAG}\`\n"
          BODY+="- **Go:** \`$(cat go.mod | grep '^go ' | awk '{print $2}')\`\n\n"
          BODY+="---\n"
          BODY+="_Full changelog auto-generated by PR labels. See categories above._"

          # Write multiline to output
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # ─── Create GitHub Release ───
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true    # ← ใช้ .github/release.yml จัดกลุ่ม PR
          make_latest: ${{ steps.version.outputs.prerelease == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Summary ───
      - name: Release summary
        if: always()
        run: |
          echo "## 📋 Release Created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tag** | \`${{ steps.version.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pre-release** | ${{ steps.version.outputs.prerelease }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commits** | ${{ steps.meta.outputs.commit_count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ steps.meta.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.prev.outputs.prev_tag }}" ]; then
            echo "| **Previous** | \`${{ steps.prev.outputs.prev_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }})" >> "$GITHUB_STEP_SUMMARY"

      # ─── Notify Discord ───
      - name: Notify Discord
        if: success() && secrets.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\":\"📋 **Release ${{ steps.version.outputs.tag }}** published\nCommits: ${{ steps.meta.outputs.commit_count }}\nhttps://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
