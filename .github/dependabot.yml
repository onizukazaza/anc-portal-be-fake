# =============================================================================
# Dependabot — Auto-update Go modules + GitHub Actions
# =============================================================================
version: 2

updates:
  # >> Go modules
  - package-ecosystem: gomod
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "deps"
      include: scope

  # >> GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"
      include: scope

  # >> Docker base images
  - package-ecosystem: docker
    directory: /deployments/docker
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker"
      include: scope
