# =============================================================================
# Observability Stack — Grafana + Tempo + Prometheus + OTel Collector
# =============================================================================
# ใช้สำหรับ local development เท่านั้น
#
# วิธีใช้:
#   cd deployments/observability
#   docker compose up -d
#
# Endpoints:
#   Grafana     → http://localhost:3001  (admin/admin)
#   Prometheus  → http://localhost:9090
#   Tempo       → http://localhost:3200
#   OTel HTTP   → http://localhost:4318  (Go app ส่ง traces/metrics มาที่นี่)
# =============================================================================

services:
  # >> OTel Collector — รับ OTLP/HTTP แล้ว fan-out ไป Tempo + Prometheus
  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_PORT}:4318"   # OTLP/HTTP receiver (Go app → Collector)
    environment:
      - OTEL_BATCH_TIMEOUT=${OTEL_BATCH_TIMEOUT}
      - OTEL_BATCH_SIZE=${OTEL_BATCH_SIZE}
    depends_on:
      - tempo
      - prometheus
    restart: unless-stopped

  # >> Grafana Tempo — distributed tracing backend
  tempo:
    image: ${TEMPO_IMAGE}
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_PORT}:3200"   # Tempo HTTP API
    restart: unless-stopped

  # >> Prometheus — metrics collection + storage
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # >> Grafana — dashboards + visualization
  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      # Anonymous access — Viewer role only (local dev convenience)
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"   # Grafana UI (ใช้ 3001 เลี่ยง conflict กับ Go app)
    depends_on:
      - tempo
      - prometheus
    restart: unless-stopped

volumes:
  tempo-data:
  prometheus-data:
  grafana-data:
