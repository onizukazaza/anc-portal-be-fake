apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: anc-portal-api
  namespace: anc-portal
  labels:
    app.kubernetes.io/name: anc-portal-api
    app.kubernetes.io/part-of: anc-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: anc-portal-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
