apiVersion: apps/v1
kind: Deployment
metadata:
  name: anc-portal-worker
  namespace: anc-portal
  labels:
    app.kubernetes.io/name: anc-portal-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: anc-portal
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: anc-portal-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anc-portal-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: anc-portal
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          # ⚠️  เปลี่ยน image ตาม registry จริง
          image: ghcr.io/anc-portal/anc-portal-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: anc-portal-config
            - secretRef:
                name: anc-portal-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          # Worker health probe — HTTP endpoint บน port 20001
          livenessProbe:
            httpGet:
              path: /healthz
              port: 20001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 20001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
