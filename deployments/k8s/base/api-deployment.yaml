apiVersion: apps/v1
kind: Deployment
metadata:
  name: anc-portal-api
  namespace: anc-portal
  labels:
    app.kubernetes.io/name: anc-portal-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: anc-portal
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: anc-portal-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anc-portal-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: anc-portal
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 15
      containers:
        - name: api
          # ⚠️  เปลี่ยน image ตาม registry จริง
          image: ghcr.io/onizukazaza/anc-portal-be-fake:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 20000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: anc-portal-config
            - secretRef:
                name: anc-portal-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 10
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
