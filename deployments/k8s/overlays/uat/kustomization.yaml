apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: uat-

patches:
  # API: 2 replicas for UAT
  - target:
      kind: Deployment
      name: anc-portal-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  # Worker: 1 replica
  - target:
      kind: Deployment
      name: anc-portal-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # HPA: 2-4 pods
  - target:
      kind: HorizontalPodAutoscaler
      name: anc-portal-api
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 4

  # ConfigMap: UAT values
  - target:
      kind: ConfigMap
      name: anc-portal-config
    patch: |
      - op: replace
        path: /data/STAGE_STATUS
        value: "staging"
      - op: replace
        path: /data/SERVER_ALLOW_ORIGINS
        value: "https://uat-portal.anc.co.th"
      - op: replace
        path: /data/OTEL_ENV
        value: "uat"
      - op: replace
        path: /data/OTEL_SAMPLE_RATIO
        value: "0.5"
      - op: replace
        path: /data/SWAGGER_ENABLED
        value: "true"
      - op: replace
        path: /data/SWAGGER_HOST
        value: "uat-portal-api.anc.co.th"
      - op: add
        path: /data/SWAGGER_SCHEMES
        value: "https"
      - op: replace
        path: /data/REDIS_KEY_PREFIX
        value: "anc-uat:"
      - op: replace
        path: /data/KAFKA_TOPIC
        value: "anc-portal-events-uat"
      - op: replace
        path: /data/KAFKA_GROUP_ID
        value: "anc-portal-worker-uat"
