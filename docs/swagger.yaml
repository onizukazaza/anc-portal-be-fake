basePath: /v1
definitions:
  github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse:
    properties:
      message:
        description: คำอธิบาย ("success", "created successfully", "not found")
        type: string
      result:
        description: ข้อมูลผลลัพธ์ — null ถ้า error
      status:
        description: '"OK" หรือ "ERROR"'
        type: string
      status_code:
        description: HTTP status code (200, 201, 400, 500, ...)
        type: integer
    type: object
  github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse:
    properties:
      message:
        description: Error description
        example: quotation not found
        type: string
      result:
        allOf:
        - $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResult'
        description: Contains trace_id
      status:
        description: '"ERROR"'
        example: ERROR
        type: string
      status_code:
        description: HTTP status code
        example: 400
        type: integer
    type: object
  github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResult:
    properties:
      trace_id:
        description: Error trace identifier
        example: qt-not-found
        type: string
    type: object
  internal_modules_auth_adapters_http.loginRequest:
    properties:
      password:
        example: secret123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
host: localhost:3000
info:
  contact: {}
  description: |-
    Backend API for ANC Insurance Portal

    ## Error Response Format
    ทุก error response จะมี `trace_id` ใน `result` เพื่อระบุจุดที่เกิด error
    ```json
    {"status":"ERROR","status_code":404,"message":"quotation not found","result":{"trace_id":"qt-not-found"}}
    ```

    ## Error Code Catalog
    > Source of truth: `internal/shared/dto/error_codes.go`

    | Module | Trace ID | Code | HTTP | คำอธิบาย |
    |--------|----------|------|------|---------|
    | Auth | auth-bind-failed | 10001 | 400 | request body ไม่ถูกต้อง |
    | Auth | auth-invalid-creds | 10002 | 401 | username/password ไม่ถูกต้อง |
    | Auth | auth-internal-error | 10003 | 500 | เกิดข้อผิดพลาดภายใน auth service |
    | Quotation | qt-id-required | 11001 | 400 | ไม่ได้ส่ง quotation id |
    | Quotation | qt-not-found | 11002 | 404 | ไม่พบ quotation |
    | Quotation | qt-internal-error | 11003 | 500 | เกิดข้อผิดพลาดภายใน quotation service |
    | Quotation | qt-customer-id-required | 11004 | 400 | ไม่ได้ส่ง customerId |
    | Quotation | qt-list-internal-error | 11005 | 500 | เกิดข้อผิดพลาดขณะดึงรายการ quotation |
    | CMI | cmi-job-id-required | 12001 | 400 | ไม่ได้ส่ง job_id |
    | CMI | cmi-job-not-found | 12002 | 404 | ไม่พบ job |
    | CMI | cmi-internal-error | 12003 | 500 | เกิดข้อผิดพลาดภายใน CMI service |
    | ExternalDB | extdb-name-required | 13001 | 400 | ไม่ได้ส่ง database name |
    | ExternalDB | extdb-not-found | 13002 | 404 | ไม่พบ database ที่ระบุ |
    | ExternalDB | extdb-unhealthy | 13003 | 503 | database ไม่สามารถเชื่อมต่อได้ |
    | Webhook | wh-invalid-signature | 14001 | 401 | GitHub signature ไม่ถูกต้อง |
    | Webhook | wh-process-failed | 14002 | 500 | ประมวลผล webhook ล้มเหลว |
  title: ANC Portal API
  version: 1.1.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with username and password, then return access
        token
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth_adapters_http.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login success
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse'
        "400":
          description: '[10001] auth-bind-failed — request body ไม่ถูกต้อง'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "401":
          description: '[10002] auth-invalid-creds — username/password ไม่ถูกต้อง'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "500":
          description: '[10003] auth-internal-error — เกิดข้อผิดพลาดภายใน auth service'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /cmi/{job_id}/request-policy-single-cmi:
    get:
      consumes:
      - application/json
      description: ดึงข้อมูลงาน พรบ. เดี่ยว (Compulsory Motor Insurance) ตาม job_id
      parameters:
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: CMI policy data
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse'
        "400":
          description: '[12001] cmi-job-id-required — ไม่ได้ส่ง job_id'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "404":
          description: '[12002] cmi-job-not-found — ไม่พบ job'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "500":
          description: '[12003] cmi-internal-error — เกิดข้อผิดพลาดภายใน CMI service'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get CMI policy by job ID
      tags:
      - CMI
  /external-db/health:
    get:
      consumes:
      - application/json
      description: Test connectivity of all registered external databases
      produces:
      - application/json
      responses:
        "200":
          description: All database statuses
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse'
      security:
      - BearerAuth: []
      summary: Check all external databases
      tags:
      - ExternalDB
  /external-db/health/{name}:
    get:
      consumes:
      - application/json
      description: Test connectivity of a specific external database
      parameters:
      - description: Database name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Database status
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse'
        "400":
          description: '[13001] extdb-name-required — ไม่ได้ส่ง database name'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "404":
          description: '[13002] extdb-not-found — ไม่พบ database ที่ระบุ'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "503":
          description: '[13003] extdb-unhealthy — database ไม่สามารถเชื่อมต่อได้'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Check external database by name
      tags:
      - ExternalDB
  /quotations:
    get:
      consumes:
      - application/json
      description: Retrieve paginated quotations for a given customer from external
        ERP database
      parameters:
      - description: Customer ID
        in: query
        name: customerId
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Sort column
        enum:
        - created_at
        - doc_no
        - total_amount
        - status
        in: query
        name: sort
        type: string
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated quotations
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse'
        "400":
          description: '[11004] qt-customer-id-required — ไม่ได้ส่ง customerId'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "500":
          description: '[11005] qt-list-internal-error — เกิดข้อผิดพลาดขณะดึงรายการ
            quotation'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List quotations by customer
      tags:
      - Quotation
  /quotations/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a single quotation from external ERP database
      parameters:
      - description: Quotation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Quotation data
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse'
        "400":
          description: '[11001] qt-id-required — ไม่ได้ส่ง quotation id'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "404":
          description: '[11002] qt-not-found — ไม่พบ quotation'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "500":
          description: '[11003] qt-internal-error — เกิดข้อผิดพลาดภายใน quotation
            service'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get quotation by ID
      tags:
      - Quotation
  /webhooks/github:
    post:
      consumes:
      - application/json
      description: Receives a push event from GitHub webhook and sends notification
        to Discord
      parameters:
      - description: GitHub HMAC signature
        in: header
        name: X-Hub-Signature-256
        type: string
      - description: GitHub event type
        in: header
        name: X-GitHub-Event
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Event processed
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse'
        "400":
          description: Unsupported event
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ApiResponse'
        "401":
          description: '[14001] wh-invalid-signature — GitHub signature ไม่ถูกต้อง'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
        "500":
          description: '[14002] wh-process-failed — ประมวลผล webhook ล้มเหลว'
          schema:
            $ref: '#/definitions/github_com_onizukazaza_anc-portal-be-fake_internal_shared_dto.ErrorResponse'
      summary: Receive GitHub push webhook
      tags:
      - Webhook
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'Input: Bearer {access_token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
